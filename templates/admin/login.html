<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign In — Roz Boutique</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg, var(--blush), var(--cream));">
<div style="width:100%; max-width:420px; padding:20px;">
  <div style="text-align:center; margin-bottom:24px;">
    <div class="logo" style="font-size:2.4rem;">Ro<span>z</span> Boutique</div>
    <p style="color:var(--ink-light); font-size:0.86rem; text-transform:uppercase; letter-spacing:0.1em;">Admin Console</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <div class="form-card" style="max-width:none;">
    <form method="post">
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    <p style="text-align:center; margin-top:18px; font-size:0.78rem; color:var(--ink-light);">Demo credentials: your own admin login (set earlier)</p>
  </div>
</div>
</body>
</html>
