{% extends "base.html" %}
{% import "macros.html" as m %}
{% block title %}Create Account — Roz Boutique{% endblock %}
{% block content %}
<section class="section--tight">
  <div class="container">
    {{ m.vine_divider() }}
    <div class="form-card">
      <div class="section-head" style="margin-bottom:26px;">
        <span class="eyebrow">Join Roz Boutique</span>
        <h2>Create Your Account</h2>
      </div>
      <form method="post">
        <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
      <p style="text-align:center; margin-top:20px; font-size:0.88rem; color:var(--ink-light);">
        Already have an account? <a href="{{ url_for('account_login') }}" style="color:var(--rose-deep);">Sign in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
